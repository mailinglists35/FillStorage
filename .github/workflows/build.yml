name: Build TrollStore IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build App Binary
        run: |
          xcodebuild clean build \
            -project *.xcodeproj \
            -scheme FillStorage \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT=build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package into IPA (TrollStore Style)
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/*.app Payload/
          zip -r FillStorage.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FillStorage-TrollStore
          path: FillStorage.ipa