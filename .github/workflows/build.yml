name: Build TrollStore IPA

on:
  workflow_dispatch: # Permite declanșarea manuală din interfața GitHub

jobs:
  build:
    runs-on: macos-14 # Rulează pe instanță de macOS cu Xcode instalat
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build App Binary
        run: |
          xcodebuild clean build \
            -project FillStorage.xcodeproj \
            -scheme FillStorage \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONCURRENT_BUILD_NOT_SET=YES

      - name: Package into IPA (TrollStore Style)
        run: |
          mkdir -p Payload
          # Localizează binarul kompilat .app (calea variază în funcție de proiect)
          cp -r build/Release-iphoneos/FillStorage.app Payload/
          zip -r FillStorage.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FillStorage-TrollStore
          path: FillStorage.ipa